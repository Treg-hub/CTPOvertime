name: ctp_overtime_tracker
description: CTP Gravure Overtime Tracker - Browser-first app with dark/light mode and Firebase Auth
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  provider: ^6.1.1
  uuid: ^4.3.3
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  collection: ^1.18.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
